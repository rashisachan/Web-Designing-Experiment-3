<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="todo-app">
        <header>
            <h1>📋 To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>
        
        <div class="input-section">
            <label for="taskInput" class="sr-only">New task</label>
            <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
            <button id="addBtn" aria-label="Add task">+ Add Task</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All Tasks</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="tasks-section">
            <ul id="taskList" aria-label="Task list"></ul>
        </div>

        <div class="stats-section">
            <span id="stats" aria-live="polite"></span>
            <button id="clearBtn" class="clear-btn">Clear Completed</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
